# LSF site defaults for the thesis HPC campaign (DTU cluster). Queue names,
# walltime caps, and memory reservations live here in one place; the
# submit_stageXX.sh scripts mirror these values. DTU HPC, V100 (32 GB) via
# the gpuv100 queue. See docs/HPC_SETUP.md for the full setup.

queue: gpuv100
walltime: "24:00"            # bsub -W format: HH:MM (Stage 3 fallback)

# CPU cores + per-core memory (MB); ~32 GB total, well above the ResNet-34 peak.
cpu_cores: 8
memory_per_core_mb: 4000
gpu_spec: "num=1:mode=exclusive_process"

# Walltime budgets for lighter stages (sized for worst case at 100 epochs,
# generous margin). Stage 3 falls back to `walltime` above.

stage1b_walltime: "3:00"     # OOF probability collection (ResNet-18, 30 epochs, Adam)
stage1c_walltime: "1:00"     # Noise injection (CPU; minutes real)

# Per-method Stage 3 walltimes (HH:MM; falls back to walltime above).
stage3_walltime_by_method:
  baseline:      "12:00"     # ~6.2h worst case, ~5.8h margin
  sce:           "12:00"
  elr:           "12:00"
  asyco:         "24:00"     # ~15.5h worst case, ~8.5h margin
  asyco_divmix:  "24:00"     # ~31h extrapolated for 100 epochs imbalanced ResNet-34;
                             # 25-epoch budget should fit; longer budgets risk truncation.

# Where to write job stdout/stderr. Relative to the project root. The
# submit scripts create this directory if missing. If logs grow large,
# symlink `logs/` to work3 (see docs/HPC_SETUP.md).
log_dir: logs

# Job-name prefix. Lets you kill the whole campaign with:
#   bkill -J "thesis_*"
job_prefix: thesis